services:
  # Node.js Backend Service
  - type: web
    name: chatta-server
    runtime: node
    plan: free
    env: node
    rootDir: server
    buildCommand: "npm install"
    startCommand: "npm start"
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        value: https://chatta-client.onrender.com
    healthCheckPath: /api/rooms

  # React Frontend Static Site
  - type: web
    name: chatta-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: "npm install && npm run build"
    buildFolder: dist
    envVars:
      - key: VITE_SOCKET_URL
        value: https://chatta-server.onrender.com
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html
